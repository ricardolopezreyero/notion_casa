<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡 Casa López Acosta · Tablero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<style>
:root{
  --green:#56EF9F; --green-d:#2BC878;
  --navy-deep:#001240; --navy-mid:#001a5e; --navy:#002582;
  --blue:#0039C8; --blue-mid:#2A89FB; --blue-soft:#F4F7FF; --blue-softer:#EEF2FF;
  --border:#e0e8f8; --muted:#666; --dim:#aaa;
  --ease:cubic-bezier(.16,1,.3,1);
  /* responsables */
  --r-ricardo:#0039C8; --r-ana:#C0399B; --r-dos:#002582; --r-michelle:#E0820C; --r-disp:#5a6478;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  background:var(--navy-deep); color:#1a1a1a;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none}
em{font-style:italic;color:var(--green)}

/* ---------- NAV ---------- */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  gap:18px;padding:14px 28px;
  background:rgba(0,18,64,.97);
  border-bottom:.5px solid rgba(86,239,159,.12);
  backdrop-filter:blur(16px);
}
.nav-left{display:flex;align-items:center;gap:16px;min-width:0}
.nav-logo img{height:26px;display:block}
.nav-title{
  font-size:15px;font-weight:800;letter-spacing:-.3px;color:#fff;white-space:nowrap;
}
.nav-title span{color:var(--green)}
.nav-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.sync-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  padding:4px 11px;border-radius:20px;
  background:rgba(86,239,159,.1);color:var(--green);
  border:.5px solid rgba(86,239,159,.25);white-space:nowrap;
}
.sync-pill.local{background:rgba(255,255,255,.06);color:#7a9fd4;border-color:rgba(255,255,255,.12)}
.sync-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.btn{
  display:inline-flex;align-items:center;gap:7px;
  font-size:12.5px;font-weight:700;border-radius:8px;padding:9px 15px;
  transition:transform .2s var(--ease),box-shadow .2s,background .2s;white-space:nowrap;
}
.btn:hover{transform:translateY(-1px)}
.btn-green{background:var(--green);color:var(--navy)}
.btn-green:hover{box-shadow:0 8px 22px rgba(86,239,159,.28)}
.btn-ghost{background:rgba(255,255,255,.06);color:#cdd9f0;border:.5px solid rgba(255,255,255,.1)}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:#fff;transform:translateY(-1px)}

/* ---------- BOARD ---------- */
.board-wrap{padding:22px 28px 60px}
.board{
  display:grid;
  grid-template-columns:repeat(5,minmax(248px,1fr));
  gap:16px;align-items:start;
}
.col{
  background:rgba(255,255,255,.04);
  border:.5px solid rgba(255,255,255,.07);
  border-radius:14px;padding:12px 10px 14px;
  min-height:200px;transition:border-color .2s,background .2s;
}
.col.drag-over{border-color:rgba(86,239,159,.45);background:rgba(86,239,159,.05)}
.col-head{display:flex;align-items:center;gap:8px;padding:4px 6px 12px}
.col-dot{width:9px;height:9px;border-radius:50%;flex:none}
.col-name{font-size:12px;font-weight:800;letter-spacing:.2px;color:#fff;text-transform:uppercase}
.col-count{
  margin-left:auto;font-size:11px;font-weight:700;color:#7a9fd4;
  background:rgba(255,255,255,.06);border-radius:20px;padding:2px 9px;min-width:24px;text-align:center;
}
.col-body{display:flex;flex-direction:column;gap:9px;min-height:30px}
.col-empty{font-size:11px;color:#3a5a9a;text-align:center;padding:18px 6px;font-weight:500}

/* ---------- CARD ---------- */
.card{
  background:#fff;border:.5px solid var(--border);border-radius:11px;
  padding:11px 12px 10px;cursor:grab;position:relative;
  transition:transform .25s var(--ease),box-shadow .25s;
  animation:fIn .3s var(--ease);
}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,18,64,.22)}
.card.dragging{opacity:.45;cursor:grabbing}
.card-title{font-size:13.5px;font-weight:700;line-height:1.32;letter-spacing:-.2px;color:#16203a;padding-right:34px;word-break:break-word}
.card-note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:5px;word-break:break-word}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:9px}
.pill{
  font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 9px;border-radius:20px;white-space:nowrap;
}
.pill-cat{background:var(--blue-softer);color:var(--blue);font-weight:600;text-transform:none;letter-spacing:0;font-size:10px}
.pill-recur{background:#FFF4E0;color:#B8730A;display:inline-flex;align-items:center;gap:3px}
.card-date{font-size:10px;color:var(--dim);font-weight:600;margin-left:auto}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.card:hover .card-actions{opacity:1}
.icon-btn{
  width:22px;height:22px;border-radius:6px;display:grid;place-items:center;
  background:transparent;color:#9aa7c4;font-size:12px;line-height:1;
}
.icon-btn:hover{background:var(--blue-soft);color:var(--navy)}
.icon-btn.del:hover{background:#FFECEC;color:#D33}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;z-index:500;background:rgba(0,9,32,.55);
  backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;
  padding:48px 18px;overflow-y:auto;
}
.overlay.show{display:flex}
.modal{
  background:#fff;border-radius:16px;width:100%;max-width:520px;
  box-shadow:0 30px 80px rgba(0,9,32,.5);animation:fIn .3s var(--ease);
  overflow:hidden;
}
.modal.wide{max-width:680px}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 14px;border-bottom:.5px solid var(--border);
}
.modal-head h2{font-size:18px;font-weight:800;letter-spacing:-.4px;color:#16203a}
.modal-head .sub{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
.x{width:30px;height:30px;border-radius:8px;background:var(--blue-soft);color:var(--navy);font-size:16px;display:grid;place-items:center}
.x:hover{background:var(--blue-softer)}
.modal-body{padding:20px 24px 24px;max-height:62vh;overflow-y:auto}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);margin-bottom:7px}
.field input[type=text],.field textarea,.field select{
  width:100%;font-family:inherit;font-size:14px;color:#16203a;
  border:.5px solid var(--border);border-radius:9px;padding:11px 13px;background:#fff;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,57,200,.1);
}
.field textarea{resize:vertical;min-height:64px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  font-size:12px;font-weight:600;padding:7px 13px;border-radius:8px;
  background:var(--blue-soft);color:var(--navy);border:.5px solid transparent;transition:.15s;
}
.chip:hover{background:var(--blue-softer)}
.chip.on{background:var(--navy);color:#fff}
.daychip{min-width:40px;text-align:center}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding-top:6px}
.btn-lg{padding:12px 22px;font-size:14px;border-radius:9px}
.btn-cancel{background:#fff;color:var(--muted);border:.5px solid var(--border)}
.btn-cancel:hover{background:var(--blue-soft);color:var(--navy);transform:none}
.help{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5}

/* recur toggle */
.recur-box{border:.5px solid var(--border);border-radius:11px;padding:14px;background:var(--blue-soft);margin-top:4px}
.recur-box.off .recur-opts{display:none}
.switch{display:flex;align-items:center;gap:10px;cursor:pointer}
.switch input{display:none}
.switch .track{width:40px;height:23px;border-radius:20px;background:#cdd9f0;position:relative;transition:.2s;flex:none}
.switch .track::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s var(--ease);box-shadow:0 2px 5px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--green-d)}
.switch input:checked + .track::after{left:19px}
.switch .lbl{font-size:13px;font-weight:700;color:#16203a}
.recur-opts{margin-top:14px}

/* common tasks catalog */
.cat-group{margin-bottom:18px}
.cat-group h3{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--blue);
  margin-bottom:9px;display:flex;align-items:center;gap:7px;
}
.cat-group h3 .who{font-size:9px;background:var(--blue-softer);color:var(--blue);padding:2px 8px;border-radius:20px;letter-spacing:.5px}
.common-item{
  display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  background:#fff;border:.5px solid var(--border);border-radius:9px;
  padding:10px 12px;margin-bottom:6px;font-size:13px;font-weight:500;color:#16203a;transition:.15s;
}
.common-item:hover{border-color:var(--blue);background:var(--blue-soft);transform:translateX(2px)}
.common-item .add{margin-left:auto;font-size:11px;font-weight:700;color:var(--green-d);white-space:nowrap}
.common-item.added{opacity:.5;pointer-events:none}
.common-item.added .add{color:var(--muted)}
.search-box{margin-bottom:16px}

/* recurring list */
.recur-item{display:flex;align-items:center;gap:12px;padding:12px;border:.5px solid var(--border);border-radius:10px;margin-bottom:8px;background:#fff}
.recur-item .info{flex:1;min-width:0}
.recur-item .rt{font-size:13.5px;font-weight:700;color:#16203a}
.recur-item .rd{font-size:11.5px;color:var(--muted);margin-top:3px}
.recur-empty{font-size:13px;color:var(--muted);text-align:center;padding:24px}

/* responsable pill colors */
.r-ricardo{background:rgba(0,57,200,.1);color:var(--r-ricardo)}
.r-ana{background:rgba(192,57,155,.12);color:var(--r-ana)}
.r-dos{background:rgba(0,37,130,.1);color:var(--r-dos)}
.r-michelle{background:rgba(224,130,12,.13);color:var(--r-michelle)}
.r-disp{background:rgba(90,100,120,.12);color:var(--r-disp)}

.foot{text-align:center;padding:24px;color:rgba(255,255,255,.22);font-size:11px;font-weight:500}
.foot span{color:rgba(255,255,255,.4)}

@keyframes fIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:10px}
.modal-body::-webkit-scrollbar-thumb{background:#cdd9f0}

@media(max-width:1100px){
  .board{display:flex;overflow-x:auto;gap:14px;padding-bottom:14px}
  .col{min-width:262px}
}
</style>
</head>

<nav class="nav">
  <div class="nav-left">
    <a class="nav-logo" href="#" onclick="return false"><img src="https://assets.cdn.filesafe.space/E6Gh1sE1RnPtadmL7wmG/media/698e530bc08665d629146a14.png" alt="SuperLeads"></a>
    <div class="nav-title">🏡 Casa <span>López Acosta</span></div>
  </div>
  <div class="nav-actions">
    <span id="syncPill" class="sync-pill local"><span class="dot"></span><span id="syncTxt">Local</span></span>
    <button class="btn btn-green" onclick="openNew()">＋ Nueva tarea</button>
    <button class="btn btn-ghost" onclick="openCommon()">⭐ Tarea común</button>
    <button class="btn btn-ghost" onclick="openRecur()">🔁 Recurrentes</button>
    <button class="btn btn-ghost" onclick="exportJSON()">⬇︎</button>
    <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">⬆︎</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
  </div>
</nav>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<div class="foot">Tablero de la casa · estilo <span>SuperLeads</span> · se guarda solo</div>

<!-- ============ MODAL: NUEVA / EDITAR ============ -->
<div class="overlay" id="ovNew">
  <div class="modal">
    <div class="modal-head">
      <div><h2 id="newTitle">Nueva tarea</h2><div class="sub" id="newSub">Cae en "Por hacer"</div></div>
      <button class="x" onclick="closeOv('ovNew')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <div class="field">
        <label>¿Qué hay que hacer?</label>
        <input type="text" id="f-title" placeholder="Ej. arreglar la llave de la puerta" autocomplete="off">
      </div>
      <div class="row2">
        <div class="field">
          <label>Responsable</label>
          <select id="f-assignee"></select>
        </div>
        <div class="field">
          <label>Columna</label>
          <select id="f-status"></select>
        </div>
      </div>
      <div class="field">
        <label>Categoría (opcional)</label>
        <input type="text" id="f-category" placeholder="Ej. Mantenimiento" list="catList" autocomplete="off">
        <datalist id="catList"></datalist>
      </div>
      <div class="field">
        <label>Nota (opcional)</label>
        <textarea id="f-note" placeholder="Detalles, lugar, lo que se necesita..."></textarea>
      </div>

      <div class="field" id="recurField">
        <label>¿Es recurrente?</label>
        <div class="recur-box off" id="recurBox">
          <label class="switch">
            <input type="checkbox" id="f-recur" onchange="toggleRecur()">
            <span class="track"></span>
            <span class="lbl">Repetir automáticamente</span>
          </label>
          <div class="recur-opts">
            <div class="field" style="margin-top:14px;margin-bottom:12px">
              <label>Frecuencia</label>
              <div class="chips" id="freqChips">
                <button class="chip on" data-freq="daily" onclick="setFreq(this)">Diaria</button>
                <button class="chip" data-freq="weekly" onclick="setFreq(this)">Semanal</button>
                <button class="chip" data-freq="monthly" onclick="setFreq(this)">Mensual</button>
              </div>
            </div>
            <div class="field" id="weeklyOpts" style="display:none;margin-bottom:8px">
              <label>¿Qué días?</label>
              <div class="chips" id="dayChips"></div>
            </div>
            <div class="field" id="monthlyOpts" style="display:none;margin-bottom:8px">
              <label>Día del mes</label>
              <select id="f-dom"></select>
            </div>
            <p class="help">Cada vez que toque, se crea una tarea nueva en <b>Por hacer</b> automáticamente.</p>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot" style="padding:0 24px 22px">
      <button class="btn btn-lg btn-cancel" onclick="closeOv('ovNew')">Cancelar</button>
      <button class="btn btn-lg btn-green" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<!-- ============ MODAL: TAREAS COMUNES ============ -->
<div class="overlay" id="ovCommon">
  <div class="modal wide">
    <div class="modal-head">
      <div><h2>⭐ Tareas comunes</h2><div class="sub">Un clic la agrega a "Por hacer"</div></div>
      <button class="x" onclick="closeOv('ovCommon')">✕</button>
    </div>
    <div class="modal-body">
      <div class="search-box field" style="margin-bottom:14px">
        <input type="text" id="commonSearch" placeholder="🔎 Buscar tarea..." oninput="renderCommon()" autocomplete="off">
      </div>
      <div id="commonList"></div>
    </div>
  </div>
</div>

<!-- ============ MODAL: RECURRENTES ============ -->
<div class="overlay" id="ovRecur">
  <div class="modal">
    <div class="modal-head">
      <div><h2>🔁 Tareas recurrentes</h2><div class="sub">Se generan solas en "Por hacer"</div></div>
      <button class="x" onclick="closeOv('ovRecur')">✕</button>
    </div>
    <div class="modal-body">
      <div id="recurList"></div>
      <button class="btn btn-lg btn-green" style="width:100%;justify-content:center;margin-top:6px" onclick="closeOv('ovRecur');openNew(null,true)">＋ Nueva recurrente</button>
    </div>
  </div>
</div>

/* ============================================================
   ESTADO
   ============================================================ */
let state = {tasks:[], recurring:[]};
let db = null, syncing = false, suppress = false;
let curFreq = "daily", curDays = [], editingRecur = false;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const todayStr = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmtDate = s => { if(!s) return ""; const d=new Date(s); return d.toLocaleDateString("es-MX",{day:"numeric",month:"short"}); };
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const assigneeOf = id => ASSIGNEES.find(a=>a.id===id) || ASSIGNEES[2];

/* ---------- Persistencia ---------- */
function load(){
  try{ const r=localStorage.getItem("board-"+BOARD_KEY); if(r) state=JSON.parse(r); }catch(e){}
  if(!state.tasks) state.tasks=[]; if(!state.recurring) state.recurring=[];
}
function persist(){
  localStorage.setItem("board-"+BOARD_KEY, JSON.stringify(state));
  if(db && !suppress){ db.ref("boards/"+BOARD_KEY).set(state).catch(()=>{}); }
}

/* ---------- Firebase ---------- */
function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf("PEGA")===0){ setSync(false); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    setSync(true);
    db.ref("boards/"+BOARD_KEY).on("value", snap=>{
      const val = snap.val();
      if(val){ suppress=true; state={tasks:val.tasks||[],recurring:val.recurring||[]}; suppress=false; localStorage.setItem("board-"+BOARD_KEY,JSON.stringify(state)); render(); }
      else { db.ref("boards/"+BOARD_KEY).set(state).catch(()=>{}); }
    }, ()=>{ setSync(false); });
  }catch(e){ setSync(false); }
}
function setSync(on){
  syncing=on;
  const p=document.getElementById("syncPill"), t=document.getElementById("syncTxt");
  if(on){ p.classList.remove("local"); t.textContent="Sincronizado"; }
  else { p.classList.add("local"); t.textContent="Local"; }
}

/* ============================================================
   RECURRENCIA — genera instancias en "Por hacer"
   ============================================================ */
function runRecurring(){
  const today = todayStr(), now = new Date(), dow = now.getDay(), dom = now.getDate();
  let added = false;
  state.recurring.forEach(r=>{
    if(r.lastGenerated === today) return;
    let due=false;
    if(r.freq==="daily") due=true;
    else if(r.freq==="weekly") due=(r.days||[]).includes(dow);
    else if(r.freq==="monthly"){
      const last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
      const target=Math.min(r.dayOfMonth||1,last);
      due=(dom===target);
    }
    if(due){
      state.tasks.unshift({
        id:uid(), title:r.title, assignee:r.assignee, category:r.category||"",
        note:"", status:"porhacer", recurId:r.id, createdAt:Date.now(), date:today
      });
      r.lastGenerated = today; added=true;
    }
  });
  if(added) persist();
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  const board=document.getElementById("board");
  board.innerHTML = COLUMNS.map(col=>{
    const cards = state.tasks.filter(t=>t.status===col.id);
    return `<div class="col" data-col="${col.id}"
        ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${col.id}')">
      <div class="col-head">
        <span class="col-dot" style="background:${col.color}"></span>
        <span class="col-name">${col.name}</span>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-body">
        ${cards.length ? cards.map(cardHTML).join("") : '<div class="col-empty">—</div>'}
      </div>
    </div>`;
  }).join("");
}
function cardHTML(t){
  const a=assigneeOf(t.assignee);
  const recur = t.recurId ? `<span class="pill pill-recur">🔁 auto</span>` : "";
  const cat = t.category ? `<span class="pill pill-cat">${esc(t.category)}</span>` : "";
  return `<div class="card" draggable="true" data-id="${t.id}"
      ondragstart="onDragStart(event,'${t.id}')" ondragend="onDragEnd(event)">
    <div class="card-actions">
      <button class="icon-btn" title="Editar" onclick="openNew('${t.id}')">✎</button>
      <button class="icon-btn del" title="Borrar" onclick="delTask('${t.id}')">✕</button>
    </div>
    <div class="card-title">${esc(t.title)}</div>
    ${t.note?`<div class="card-note">${esc(t.note)}</div>`:""}
    <div class="card-meta">
      <span class="pill ${a.cls}">${esc(a.name)}</span>
      ${cat}${recur}
      ${t.date?`<span class="card-date">${fmtDate(t.date)}</span>`:""}
    </div>
  </div>`;
}

/* ---------- Drag & drop ---------- */
let dragId=null;
function onDragStart(e,id){ dragId=id; e.currentTarget.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; }
function onDragEnd(e){ e.currentTarget.classList.remove("dragging"); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function onDragLeave(e){ e.currentTarget.classList.remove("drag-over"); }
function onDrop(e,col){
  e.preventDefault(); e.currentTarget.classList.remove("drag-over");
  const t=state.tasks.find(x=>x.id===dragId);
  if(t && t.status!==col){ t.status=col; persist(); render(); }
  dragId=null;
}

/* ============================================================
   MODAL NUEVA / EDITAR
   ============================================================ */
function fillSelectors(){
  document.getElementById("f-assignee").innerHTML = ASSIGNEES.map(a=>`<option value="${a.id}">${a.name}</option>`).join("");
  document.getElementById("f-status").innerHTML = COLUMNS.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
  document.getElementById("f-dom").innerHTML = Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join("");
  document.getElementById("dayChips").innerHTML = DAYS.map(d=>`<button class="chip daychip" data-day="${d.i}" onclick="toggleDay(this)">${d.t}</button>`).join("");
  const cats=[...new Set(COMMON.map(g=>g.cat))];
  document.getElementById("catList").innerHTML = cats.map(c=>`<option value="${c}">`).join("");
}
function openNew(id, asRecur){
  editingRecur = !!asRecur;
  const isEdit = !!id;
  document.getElementById("f-id").value = id||"";
  document.getElementById("newTitle").textContent = isEdit?"Editar tarea":(asRecur?"Nueva tarea recurrente":"Nueva tarea");
  document.getElementById("newSub").textContent = asRecur?"Se generará sola en Por hacer":"Cae en \"Por hacer\"";
  document.getElementById("recurField").style.display = isEdit ? "none" : "block";

  // reset recur
  curFreq="daily"; curDays=[];
  document.getElementById("f-recur").checked = !!asRecur;
  document.getElementById("recurBox").classList.toggle("off", !asRecur);
  document.querySelectorAll("#freqChips .chip").forEach(c=>c.classList.toggle("on",c.dataset.freq==="daily"));
  document.querySelectorAll("#dayChips .chip").forEach(c=>c.classList.remove("on"));
  document.getElementById("weeklyOpts").style.display="none";
  document.getElementById("monthlyOpts").style.display="none";

  if(isEdit){
    const t=state.tasks.find(x=>x.id===id);
    document.getElementById("f-title").value=t.title;
    document.getElementById("f-assignee").value=t.assignee;
    document.getElementById("f-status").value=t.status;
    document.getElementById("f-category").value=t.category||"";
    document.getElementById("f-note").value=t.note||"";
  } else {
    document.getElementById("f-title").value="";
    document.getElementById("f-assignee").value="dos";
    document.getElementById("f-status").value="porhacer";
    document.getElementById("f-category").value="";
    document.getElementById("f-note").value="";
  }
  showOv("ovNew");
  setTimeout(()=>document.getElementById("f-title").focus(),60);
}
function toggleRecur(){
  document.getElementById("recurBox").classList.toggle("off", !document.getElementById("f-recur").checked);
}
function setFreq(btn){
  curFreq=btn.dataset.freq;
  document.querySelectorAll("#freqChips .chip").forEach(c=>c.classList.remove("on"));
  btn.classList.add("on");
  document.getElementById("weeklyOpts").style.display = curFreq==="weekly"?"block":"none";
  document.getElementById("monthlyOpts").style.display = curFreq==="monthly"?"block":"none";
}
function toggleDay(btn){
  const d=+btn.dataset.day; btn.classList.toggle("on");
  if(curDays.includes(d)) curDays=curDays.filter(x=>x!==d); else curDays.push(d);
}
function saveTask(){
  const title=document.getElementById("f-title").value.trim();
  if(!title){ document.getElementById("f-title").focus(); return; }
  const assignee=document.getElementById("f-assignee").value;
  const status=document.getElementById("f-status").value;
  const category=document.getElementById("f-category").value.trim();
  const note=document.getElementById("f-note").value.trim();
  const id=document.getElementById("f-id").value;
  const isRecur=document.getElementById("f-recur").checked && !id;

  if(isRecur){
    const rule={id:uid(),title,assignee,category,freq:curFreq,lastGenerated:""};
    if(curFreq==="weekly"){ if(!curDays.length){ alert("Elige al menos un día."); return; } rule.days=[...curDays]; }
    if(curFreq==="monthly"){ rule.dayOfMonth=+document.getElementById("f-dom").value; }
    state.recurring.push(rule);
    runRecurring(); persist(); render(); closeOv("ovNew"); return;
  }

  if(id){
    const t=state.tasks.find(x=>x.id===id);
    Object.assign(t,{title,assignee,status,category,note});
  } else {
    state.tasks.unshift({id:uid(),title,assignee,category,note,status,createdAt:Date.now(),date:todayStr()});
  }
  persist(); render(); closeOv("ovNew");
}
function delTask(id){
  if(!confirm("¿Borrar esta tarea?")) return;
  state.tasks=state.tasks.filter(t=>t.id!==id); persist(); render();
}

/* ============================================================
   TAREAS COMUNES
   ============================================================ */
function openCommon(){ document.getElementById("commonSearch").value=""; renderCommon(); showOv("ovCommon"); }
function renderCommon(){
  const q=document.getElementById("commonSearch").value.toLowerCase().trim();
  const existing=new Set(state.tasks.filter(t=>t.status!=="completada").map(t=>t.title.toLowerCase()));
  let html="";
  COMMON.forEach(g=>{
    const items=g.items.filter(it=>!q || it.toLowerCase().includes(q) || g.cat.toLowerCase().includes(q));
    if(!items.length) return;
    html+=`<div class="cat-group"><h3>${esc(g.cat)} <span class="who">${esc(g.who)}</span></h3>`;
    items.forEach(it=>{
      const added=existing.has(it.toLowerCase());
      html+=`<button class="common-item ${added?"added":""}" onclick="addCommon('${esc(it).replace(/'/g,"\\'")}','${g.a}','${esc(g.cat).replace(/'/g,"\\'")}',this)">
        <span>${esc(it)}</span><span class="add">${added?"✓ ya está":"＋ agregar"}</span></button>`;
    });
    html+=`</div>`;
  });
  document.getElementById("commonList").innerHTML = html || '<div class="recur-empty">Sin resultados.</div>';
}
function addCommon(title,assignee,category,btn){
  state.tasks.unshift({id:uid(),title,assignee,category,note:"",status:"porhacer",createdAt:Date.now(),date:todayStr()});
  persist(); render();
  btn.classList.add("added"); btn.querySelector(".add").textContent="✓ agregada";
}

/* ============================================================
   RECURRENTES (lista)
   ============================================================ */
function openRecur(){ renderRecurList(); showOv("ovRecur"); }
function renderRecurList(){
  const el=document.getElementById("recurList");
  if(!state.recurring.length){ el.innerHTML='<div class="recur-empty">Aún no hay tareas recurrentes.</div>'; return; }
  el.innerHTML = state.recurring.map(r=>{
    let d="";
    if(r.freq==="daily") d="Todos los días";
    else if(r.freq==="weekly") d="Cada semana: "+(r.days||[]).map(x=>DAYS.find(y=>y.i===x).t).join(", ");
    else d="Cada mes el día "+r.dayOfMonth;
    const a=assigneeOf(r.assignee);
    return `<div class="recur-item">
      <div class="info"><div class="rt">${esc(r.title)}</div>
        <div class="rd">${d} · <b>${esc(a.name)}</b></div></div>
      <button class="icon-btn del" style="width:28px;height:28px" title="Eliminar" onclick="delRecur('${r.id}')">✕</button>
    </div>`;
  }).join("");
}
function delRecur(id){
  if(!confirm("¿Eliminar esta recurrencia? (las tareas ya creadas se quedan)")) return;
  state.recurring=state.recurring.filter(r=>r.id!==id); persist(); renderRecurList();
}

/* ============================================================
   EXPORTAR / IMPORTAR
   ============================================================ */
function exportJSON(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="casa-lopez-acosta-"+todayStr()+".json"; a.click();
  URL.revokeObjectURL(url);
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const d=JSON.parse(rd.result);
    if(!d.tasks){ alert("Archivo no válido."); return; }
    if(!confirm("Esto reemplaza el tablero actual. ¿Continuar?")) return;
    state={tasks:d.tasks||[],recurring:d.recurring||[]}; persist(); render();
  }catch(e){ alert("No se pudo leer el archivo."); } };
  rd.readAsText(f); ev.target.value="";
}

/* ---------- Overlays ---------- */
function showOv(id){ document.getElementById(id).classList.add("show"); }
function closeOv(id){ document.getElementById(id).classList.remove("show"); }
document.addEventListener("click",e=>{ if(e.target.classList.contains("overlay")) e.target.classList.remove("show"); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") document.querySelectorAll(".overlay.show").forEach(o=>o.classList.remove("show")); });
